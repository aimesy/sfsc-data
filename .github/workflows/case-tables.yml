name: Build normalized case tables

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'archive/cases/**'
      - 'archive/cases-index.ndjson'
      - 'archive/discovered-cases.ndjson'
      - 'archive/new-filings-cases/**'
      - 'judges.json'
      - 'scripts/build_case_directory.py'
      - 'scripts/build_case_tables.py'
      - 'scripts/check_case_index_integrity.py'
      - 'scripts/check_case_directory.py'
      - 'scripts/check_case_representation.py'
      - 'scripts/check_repo_bloat.py'
      - '.github/workflows/case-tables.yml'

permissions:
  contents: write

concurrency:
  group: case-tables-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            .github/workflows/python-constraints.txt
            archive/case-directory/**
            archive/cases/**
            archive/cases-index.ndjson
            archive/discovered-cases.ndjson
            archive/new-filings-cases/**
            data/**
            judges.json
            scripts/build_case_directory.py
            scripts/build_case_tables.py
            scripts/check_case_index_integrity.py
            scripts/check_case_directory.py
            scripts/check_case_representation.py
            scripts/check_estate_dossier.py
            scripts/check_repo_bloat.py
            scripts/court_holidays.py
            scripts/estate_dossier.py
          sparse-checkout-cone-mode: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -c .github/workflows/python-constraints.txt pandas pyarrow holidays
      - name: Build case tables + commit
        env:
          SFSC_PRODUCT_DISPATCH_TOKEN: ${{ secrets.SFSC_PRODUCT_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout FETCH_HEAD
          if ! find archive/cases -maxdepth 1 -name '*.json' -print -quit | grep -q .; then
            echo "::error::archive/cases/*.json is missing; refusing to rebuild the case directory without full case JSONs."
            exit 1
          fi

          build_outputs() {
            python scripts/check_case_index_integrity.py
            python scripts/check_estate_dossier.py
            python scripts/build_case_tables.py
            python scripts/check_case_representation.py
            python scripts/build_case_directory.py --case-json-mode none --case-table data/cases.parquet
            python scripts/check_case_directory.py

            git rm -f --ignore-unmatch data/docket_entries.parquet
            git rm -f --ignore-unmatch data/entity-profiles.json

            git add \
              archive/case-directory \
              data/cases.parquet \
              data/parties.parquet \
              data/attorneys.parquet \
              data/representation.parquet \
              data/case-representation \
              data/case-representation-manifest.json \
              data/calendar.parquet \
              data/payments.parquet \
              data/estate_roles.parquet \
              data/estate_events.parquet \
              data/entity-profiles-manifest.json \
              data/entity-profiles-attorneys-*.json \
              data/entity-profiles-judges-*.json
            python scripts/check_repo_bloat.py --staged
          }

          dispatch_product() {
            if [ -z "${SFSC_PRODUCT_DISPATCH_TOKEN:-}" ]; then
              echo "No SFSC_PRODUCT_DISPATCH_TOKEN secret; skipping product deploy dispatch."
              return 0
            fi
            data_sha="$(git rev-parse HEAD)"
            python - "$data_sha" <<'PY'
          import json
          import os
          import sys
          import urllib.request

          data_sha = sys.argv[1]
          token = os.environ.get("SFSC_PRODUCT_DISPATCH_TOKEN", "")
          payload = {
              "event_type": "sfsc-data-updated",
              "client_payload": {
                  "data_repository": "aimesy/sfsc-data",
                  "data_ref": data_sha,
                  "data_sha": data_sha,
                  "pages_ready": True,
                  "payload_kind": "normalized_case_tables",
                  "source": "sfsc-data case-tables workflow",
              },
          }
          req = urllib.request.Request(
              "https://api.github.com/repos/aimesy/sfsc/dispatches",
              data=json.dumps(payload).encode("utf-8"),
              method="POST",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "sfsc-data-case-tables",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(req, timeout=60) as res:
              res.read()
          print(f"Dispatched sfsc-data-updated for {data_sha[:12]}")
          PY
          }

          build_outputs
          if git diff --staged --quiet; then
            echo "No normalized case-table changes."
            dispatch_product
            exit 0
          fi
          git commit -m "Build normalized case tables"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:master; then
              dispatch_product
              exit 0
            fi
            echo "Push rejected ($attempt/5); rebasing on origin/master ..."
            git fetch origin master
            git rebase origin/master || { git rebase --abort; exit 1; }
            build_outputs
            if ! git diff --staged --quiet; then
              git commit --amend --no-edit
            fi
            sleep $((attempt * 3))
          done
          echo "ERROR: failed to push after 5 attempts"
          exit 1
