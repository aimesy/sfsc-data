name: Catch up normalized case tables

# Mirrored in the product repo for sync; executes only in aimesy/sfsc-data.
# If scanner promotion keeps pushing raw archive commits faster than the long
# normalized-table build can finish, this monitor nudges the existing builder
# after the queue quiets enough to accept a fresh run.
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  actions: write
  contents: read

concurrency:
  group: case-tables-catchup-${{ github.ref }}
  cancel-in-progress: false

jobs:
  catchup:
    if: ${{ github.repository == 'aimesy/sfsc-data' }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch case-table build when raw head is ahead
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "sfsc-case-tables-catchup",
          }

          def request_json(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=60) as res:
                  return json.loads(res.read().decode("utf-8"))

          def request(url, method="GET", payload=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=60) as res:
                  res.read()
                  return res.status

          commits = request_json(f"https://api.github.com/repos/{repo}/commits?sha=master&per_page=25")
          head = commits[0] if commits else {}
          head_sha = str(head.get("sha") or "")
          head_title = str(((head.get("commit") or {}).get("message") or "").split("\n", 1)[0])
          if head_title == "Build normalized case tables":
              print(f"normalized case tables already at master head {head_sha[:12]}")
              raise SystemExit(0)

          ready = next(
              (
                  str(c.get("sha") or "")
                  for c in commits
                  if str(((c.get("commit") or {}).get("message") or "").split("\n", 1)[0]) == "Build normalized case tables"
              ),
              "",
          )
          for status in ("queued", "in_progress", "waiting"):
              params = urllib.parse.urlencode({
                  "branch": "master",
                  "event": "push",
                  "status": status,
                  "per_page": "20",
              })
              runs = request_json(f"https://api.github.com/repos/{repo}/actions/runs?{params}")
              active = [
                  run for run in runs.get("workflow_runs") or []
                  if run.get("name") == "Build normalized case tables"
              ]
              if active:
                  labels = ", ".join(f"{run.get('id')}:{str(run.get('head_sha') or '')[:12]}" for run in active[:5])
                  print(f"case-table build already active ({status}): {labels}")
                  raise SystemExit(0)

          status = request(
              f"https://api.github.com/repos/{repo}/actions/workflows/case-tables.yml/dispatches",
              method="POST",
              payload={"ref": "master"},
          )
          print(
              f"dispatched case-tables.yml for raw head {head_sha[:12]} "
              f"(latest normalized {ready[:12] or 'none'}), status {status}"
          )
          PY
